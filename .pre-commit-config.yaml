# .pre-commit-config.yaml — git commit 时自动跑检查
#
# 安装: pre-commit install (一次性)
# 手动跑全部文件: pre-commit run --all-files
#
# 设计:
#   - ruff lint + format: 每次 commit 前自动执行
#   - pytest smoke: 跑核心模块快速测试(Phase 2 新增),无 coverage
#   - 不阻塞本地 commit 失败(只 warning),由 make ci 完整验证

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke (Phase 2 核心模块)
        entry: .venv/bin/pytest tests/test_task.py tests/test_context.py tests/test_runtime.py tests/test_mock.py tests/test_guardrail.py tests/test_builtin.py --no-cov -q
        language: system
        pass_filenames: false
        always_run: true
