_min_ae_version: "0.1.0"
project_name:
  type: str
  help: CLI 工具名称
  default: my-cli
project_description:
  type: str
  help: 工具描述
  default: ""
language:
  type: choice
  help: 主要语言
  choices:
    typescript: TypeScript/Node
    python: Python
    go: Go
    rust: Rust
  default: typescript
package_manager:
  type: choice
  help: 包管理器
  choices: [npm, pnpm, yarn, bun, uv, poetry, cargo]
  default: pnpm
  when: "{{ language != 'go' }}"
test_runner:
  type: choice
  help: 测试框架
  choices: [vitest, jest, pytest, "go test", "cargo test"]
  default: vitest
ci_platform:
  type: choice
  help: CI 平台
  choices: [github, gitlab, none]
  default: github
